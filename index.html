<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Parvati ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<div class="hearts"></div>

<!-- WARNING PAGE -->

<section id="warning">

<div class="card">

<h3>⚠️ Warning</h3>

<h1>Hi Parvati ❤️</h1>

<p>

Opening this website may cause...

<br><br>

😊 Smiling

<br>

🦋 Butterflies

<br>

❤️ Happiness

<br><br>

Proceed at your own risk.

</p>

<button id="startBtn">

Continue ❤️

</button>

</div>

</section>

<!-- LETTER -->

<section id="letter" class="hidden">

<div class="glass">

<h2>Dear Parvati ❤️</h2>

<p id="typeText"></p>

<button id="showGallery">

Our Memories 📸

</button>

</div>

</section>

<!-- GALLERY -->

<section id="gallery" class="hidden">

<div class="glass">

<h2>Our Memories ❤️</h2>

<img id="galleryImage" src="images/photo1.jpg">

<div class="galleryButtons">

<button id="prevPhoto">

⬅

</button>

<button id="nextPhoto">

➡

</button>

</div>

<br>

<button id="proposalBtn">

One Last Thing ❤️

</button>

</div>

</section>

<!-- PROPOSAL -->

<section id="proposal" class="hidden">

<div class="glass">

<h1>

Will You Date Me?

🥹❤️

</h1>

<div class="buttons">

<button id="yesBtn">

YES ❤️

</button>

<button id="noBtn">

NO 🙈

</button>

</div>

</div>

</section>

<!-- FINAL -->

<section id="final" class="hidden">

<div class="glass">

<h1>

❤️

</h1>

<h2>

Thank You

</h2>

<p>

You just made Priyanshu the happiest person.

</p>

<h3>

Love,

Priyanshu ❤️

</h3>

</div>

</section>

<audio id="introMusic" loop>

<source src="music/intro.mp3">

</audio>

<audio id="celebrationMusic">

<source src="music/celebration.mp3">

</audio>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>

</html>
